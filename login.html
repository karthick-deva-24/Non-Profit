<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Goodwish | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--light);">
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-content">
            <img src="public/assets/images/stackly_yellow.webp" alt="Stackly Loading" class="loader-logo">
            <div class="loader-ring"></div>
        </div>
    </div>

    <!-- Header Section -->
    <header id="header" class="scrolled">
        <nav class="nav-container">
            <a href="index.html" class="logo"><img src="public/assets/images/stackly_yellow.webp" alt="Stackly Logo"></a>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links"><button class="nav-close-btn" aria-label="Close menu">&times;</button>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="donate.html" class="donate-btn">Donate <i class="fa-solid fa-heart"></i></a></li>
                <li><a href="login.html" class="active login-btn">Login <i class="fa-solid fa-right-to-bracket"></i></a></li>
            </ul>
        </nav>
    </header>

    <div class="login-wrapper" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="modal-content" style="display: block; position: static; transform: none; box-shadow: var(--shadow-lg);">
            <h2 style="text-align: center; margin-bottom: 30px;">Login to <span>Stackly</span></h2>
            <form class="contact-form" id="login-form">
                <div class="input-group">
                    <select id="user-role" required style="width: 100%; padding: 15px 20px; border: 1px solid #E2E8F0; border-radius: 10px; outline: none; background: #F8FAFC; font-family: inherit; margin-bottom: 20px;">
                        <option value="" disabled selected>Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="donor">Donor</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" id="login-email" placeholder="Username or Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 20px;">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary);">Create an Account</a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const regEmail = localStorage.getItem('registeredEmail');
            const regRole = localStorage.getItem('registeredRole');
            if (regEmail) {
                document.getElementById('login-email').value = regEmail;
                if (regRole) {
                    document.getElementById('user-role').value = regRole;
                }
            }
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('user-role').value;
            const email = document.getElementById('login-email').value;
            localStorage.setItem('loggedInEmail', email);
            
            const savedEmail = localStorage.getItem('registeredEmail');
            const savedName = localStorage.getItem('registeredName');
            
            if (email === savedEmail && savedName) {
                localStorage.setItem('loggedInName', savedName);
            } else {
                localStorage.setItem('loggedInName', email.split('@')[0]);
            }
            
            let targetUrl = 'login.html';
            if (role === 'admin') {
                targetUrl = 'admin-dashboard.html';
            } else if (role === 'donor') {
                targetUrl = 'donor-dashboard.html';
            }
            
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.style.display = 'flex';
                void preloader.offsetWidth; // force reflow
                preloader.classList.remove('loaded');
                setTimeout(() => {
                    window.location.replace(targetUrl);
                }, 500);
            } else {
                window.location.replace(targetUrl);
            }
        });
    </script>

    <!-- Simple Footer for Login -->
    <footer style="padding: 20px 0; background: #070B14;">
        <div style="text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.85rem;">
            &copy; 2026 Goodwish Non-Profit Organization.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
