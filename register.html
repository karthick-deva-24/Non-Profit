<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stackly | Create Account</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--light);">
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-content">
            <img src="public/assets/images/stackly_yellow.webp" alt="Stackly Loading" class="loader-logo">
            <div class="loader-ring"></div>
        </div>
    </div>

    <!-- Header Section -->
    <header id="header" class="scrolled">
        <nav class="nav-container">
            <a href="index.html" class="logo"><img src="public/assets/images/stackly_yellow.webp" alt="Stackly Logo"></a>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links"><button class="nav-close-btn" aria-label="Close menu">&times;</button>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="donate.html" class="donate-btn">Donate <i class="fa-solid fa-heart"></i></a></li>
                <li><a href="login.html" class="active login-btn">Login <i class="fa-solid fa-right-to-bracket"></i></a></li>
            </ul>
        </nav>
    </header>

    <div class="login-wrapper" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="modal-content" style="display: block; position: static; transform: none; box-shadow: var(--shadow-lg);">
            <h2 style="text-align: center; margin-bottom: 30px;">Create an Account</h2>
            <div id="success-msg" style="display: none; background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: 600;">
                Account created successfully! Redirecting...
            </div>
            <form class="contact-form" id="register-form" novalidate>
                <div class="input-group" style="margin-bottom: 20px;">
                    <select id="reg-role" style="width: 100%; padding: 15px 20px; border: 1px solid #E2E8F0; border-radius: 10px; outline: none; background: #F8FAFC; font-family: inherit;">
                        <option value="" disabled selected>Select Role to Register</option>
                        <option value="admin">Admin</option>
                        <option value="donor">Donor</option>
                    </select>
                    <div id="err-reg-role" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px; display: none;">please select a role</div>
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="text" id="reg-name" placeholder="Full Name" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')" style="width: 100%; padding: 15px 20px; border: 1px solid #E2E8F0; border-radius: 10px; outline: none; background: #F8FAFC; font-family: inherit;">
                    <div id="err-reg-name" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px; display: none;">enter name</div>
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="email" id="reg-email" placeholder="Email Address" style="width: 100%; padding: 15px 20px; border: 1px solid #E2E8F0; border-radius: 10px; outline: none; background: #F8FAFC; font-family: inherit;">
                    <div id="err-reg-email" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px; display: none;">enter email</div>
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="password" id="reg-pass" placeholder="Password" style="width: 100%; padding: 15px 20px; border: 1px solid #E2E8F0; border-radius: 10px; outline: none; background: #F8FAFC; font-family: inherit;">
                    <div id="err-reg-pass" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px; display: none;">enter password</div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary);">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('reg-role').value;
            const email = document.getElementById('reg-email').value;
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;

            let isValid = true;
            if (!role) { document.getElementById('err-reg-role').style.display = 'block'; isValid = false; } else { document.getElementById('err-reg-role').style.display = 'none'; }
            if (!name.trim()) { document.getElementById('err-reg-name').style.display = 'block'; isValid = false; } else { document.getElementById('err-reg-name').style.display = 'none'; }
            if (!email.trim()) { document.getElementById('err-reg-email').style.display = 'block'; isValid = false; } else { document.getElementById('err-reg-email').style.display = 'none'; }
            if (!pass.trim()) { document.getElementById('err-reg-pass').style.display = 'block'; isValid = false; } else { document.getElementById('err-reg-pass').style.display = 'none'; }

            if (!isValid) return;
            
            localStorage.setItem('registeredEmail', email);
            localStorage.setItem('registeredRole', role);
            localStorage.setItem('registeredName', name);

            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('register-form').style.opacity = '0.5';
            document.getElementById('register-form').style.pointerEvents = 'none';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>

    <footer style="padding: 20px 0; background: #070B14;">
        <div style="text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.85rem;">
            &copy; 2026 Stackly Non-Profit Organization.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
